<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman Multiplayer</title>
    <style>
        *
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body
        {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
        }

        #bg-layer
        {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 215, 0, 0.03) 0%, transparent 40%),
                #0a0a1a;
            pointer-events: none;
        }

        .stars
        {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star
        {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.6);
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle
        {
            0%
            {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100%
            {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .big-pacman
        {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            z-index: 0;
            font-size: 300px;
            opacity: 0.06;
            pointer-events: none;
            animation: floatPacman 8s ease-in-out infinite;
            filter: drop-shadow(0 0 80px rgba(255, 215, 0, 0.15));
            user-select: none;
            transition: opacity 0.6s ease;
        }

        .big-pacman.burst
        {
            animation: none !important;
            opacity: 0 !important;
            transition: opacity 0.8s ease;
        }

        @keyframes floatPacman
        {
            0%, 100%
            {
                transform: translate(-50%, -50%) scale(1.4) rotate(-3deg);
            }
            50%
            {
                transform: translate(-50%, -50%) scale(1.5) rotate(3deg);
            }
        }

        .burst-particle
        {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: particleFlySlow 2.2s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
        }

        @keyframes particleFlySlow
        {
            0%
            {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            40%
            {
                opacity: 1;
            }
            100%
            {
                opacity: 0;
                transform:
                    translate(var(--tx), var(--ty))
                    scale(0.15)
                    rotate(720deg);
            }
        }

        .spark-particle
        {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            animation: sparkFloat 2.8s ease-out forwards;
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        @keyframes sparkFloat
        {
            0%
            {
                opacity: 0.8;
                transform: translate(0, 0) scale(1);
            }
            50%
            {
                opacity: 0.6;
            }
            100%
            {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .ghost-deco
        {
            position: fixed;
            z-index: 0;
            font-size: 60px;
            opacity: 0.04;
            pointer-events: none;
            animation: ghostFloat 12s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 100, 100, 0.1));
        }

        .ghost-deco:nth-child(1)
        {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .ghost-deco:nth-child(2)
        {
            bottom: 15%;
            right: 8%;
            animation-delay: 3s;
            font-size: 45px;
        }

        .ghost-deco:nth-child(3)
        {
            top: 20%;
            right: 15%;
            animation-delay: 6s;
            font-size: 35px;
            opacity: 0.03;
        }

        @keyframes ghostFloat
        {
            0%, 100%
            {
                transform: translateY(0) rotate(0deg);
            }
            50%
            {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        .dot-path
        {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            letter-spacing: 20px;
            color: rgba(255, 215, 0, 0.05);
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            white-space: nowrap;
            animation: scrollDots 30s linear infinite;
        }

        @keyframes scrollDots
        {
            0%
            {
                transform: translateX(0);
            }
            100%
            {
                transform: translateX(-50%);
            }
        }

        #login-screen
        {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            backdrop-filter: blur(2px);
            background: rgba(10, 10, 26, 0.3);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #login-screen.hidden
        {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        #login-screen h1
        {
            position: relative;
            z-index: 2;
            color: #FFD700;
            font-size: 68px;
            margin-bottom: 5px;
            text-shadow:
                0 0 40px rgba(255, 215, 0, 0.5),
                0 0 80px rgba(255, 215, 0, 0.2),
                0 4px 0 #b8860b,
                0 8px 20px rgba(0,0,0,0.8);
            letter-spacing: 6px;
            font-weight: 900;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow
        {
            0%, 100%
            {
                text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2), 0 4px 0 #b8860b;
            }
            50%
            {
                text-shadow: 0 0 60px rgba(255,215,0,0.8), 0 0 120px rgba(255,215,0,0.4), 0 4px 0 #b8860b;
            }
        }

        #login-screen .subtitle
        {
            position: relative;
            z-index: 2;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        #login-screen input
        {
            position: relative;
            z-index: 2;
            padding: 16px 28px;
            font-size: 18px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 50px;
            background: rgba(10, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            color: #fff;
            width: 340px;
            text-align: center;
            box-shadow:
                0 0 40px rgba(0,0,0,0.6),
                inset 0 0 30px rgba(255,215,0,0.03);
            transition: all 0.4s;
            letter-spacing: 1px;
        }

        #login-screen input:focus
        {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 60px rgba(255,215,0,0.15), inset 0 0 30px rgba(255,215,0,0.05);
            background: rgba(10, 10, 26, 0.85);
        }

        #login-screen input::placeholder
        {
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
        }

        #login-screen button
        {
            position: relative;
            z-index: 2;
            margin-top: 20px;
            padding: 16px 56px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #FFD700, #f0b800);
            color: #0a0a1a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #login-screen button:hover
        {
            transform: scale(1.06);
            box-shadow: 0 0 70px rgba(255,215,0,0.5), 0 0 120px rgba(255,215,0,0.2);
            background: linear-gradient(135deg, #ffe44d, #f0b800);
        }

        #nickname-error
        {
            position: relative;
            z-index: 2;
            color: #ff6b6b;
            margin-top: 14px;
            display: none;
            text-shadow: 0 0 30px rgba(255,0,0,0.3);
            background: rgba(0,0,0,0.6);
            padding: 8px 28px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,68,68,0.15);
            font-size: 14px;
            letter-spacing: 1px;
        }

        #game-over
        {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 56px;
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.5), 0 0 100px rgba(255,0,0,0.2);
            display: none;
            z-index: 100;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 40px 70px;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,68,68,0.15);
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
        }

        #game-over .sub
        {
            font-size: 18px;
            color: rgba(255,255,255,0.4);
            margin-top: 12px;
            letter-spacing: 2px;
        }

        #restart
        {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 32px;
            font-size: 18px;
            border: 2px solid #FFD700;
            border-radius: 50px;
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 50;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255,215,0,0.1);
        }

        #restart:hover
        {
            transform: scale(1.05);
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }

        #game
        {
            display: block;
            width: 100vw;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .restart-btn
        {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 32px;
            font-size: 18px;
            border: 2px solid #FFD700;
            border-radius: 50px;
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
            font-weight: bold;
            cursor: pointer;
            z-index: 50;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255,215,0,0.1);
        }

        .restart-btn:hover
        {
            transform: scale(1.05);
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }

        .restart-btn.gameover
        {
            border-color: #FF4444;
            color: #FF4444;
            background: rgba(255, 68, 68, 0.15);
            box-shadow: 0 0 30px rgba(255,68,68,0.1);
        }

        .restart-btn.gameover:hover
        {
            background: rgba(255, 68, 68, 0.25);
            box-shadow: 0 0 50px rgba(255,68,68,0.3);
        }

        .restart-btn.winner
        {
            border-color: #FFD700;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 40px rgba(255,215,0,0.3);
            animation: winnerGlow 1.5s ease-in-out infinite;
        }

        @keyframes winnerGlow
        {
            0%, 100%
            {
                box-shadow: 0 0 40px rgba(255,215,0,0.3);
            }
            50%
            {
                box-shadow: 0 0 80px rgba(255,215,0,0.6);
            }
        }

        @media (max-width: 600px)
        {
            #login-screen h1
            {
                font-size: 42px;
                letter-spacing: 3px;
            }

            #login-screen input
            {
                width: 260px;
                font-size: 16px;
                padding: 14px 20px;
            }

            #login-screen button
            {
                font-size: 16px;
                padding: 14px 36px;
            }

            #game-over
            {
                font-size: 32px;
                padding: 25px 35px;
            }

            #restart
            {
                font-size: 14px;
                padding: 12px 20px;
                bottom: 20px;
                right: 20px;
            }

            .big-pacman
            {
                font-size: 180px;
            }

            .ghost-deco
            {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="stars" id="stars-container"></div>

    <div class="big-pacman" id="bigPacman">*</div>

    <div class="ghost-deco">~</div>
    <div class="ghost-deco">~</div>
    <div class="ghost-deco">~</div>

    <div class="dot-path">. . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .</div>

    <div id="login-screen">
        <h1>PACMAN</h1>
        <p class="subtitle">Enter nickname</p>
        <input type="text" id="nickname-input" placeholder="Your nickname..." maxlength="15">
        <button id="start-game-btn">Start Game</button>
        <p id="nickname-error">Please enter a nickname</p>
    </div>

    <div id="game-over">
        GAME OVER
        <div class="sub">try again</div>
    </div>
    <button id="restart">🔄 Restart</button>

    <canvas id="game"></canvas>

    <script>
        (function createStars()
        {
            const container = document.getElementById('stars-container');
            const count = 80;

            for (let i = 0; i < count; i++)
            {
                const star = document.createElement('div');

                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');

                const size = 1 + Math.random() * 3;

                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = (Math.random() * 5) + 's';
                star.style.opacity = 0.2 + Math.random() * 0.5;
                container.appendChild(star);
            }
        })();

        const loginScreen = document.getElementById('login-screen');
        const nicknameInput = document.getElementById('nickname-input');
        const startBtn = document.getElementById('start-game-btn');
        const errorMsg = document.getElementById('nickname-error');
        const bigPacman = document.getElementById('bigPacman');

        function burstPacmanSlow()
        {
            const rect = bigPacman.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const size = Math.min(rect.width, rect.height) * 0.5;

            const colors = ['#FFD700', '#FFC107', '#FFB300', '#FFA000', '#FF8F00', '#FFD740', '#FFAB00', '#FFE082', '#FFF176', '#FFCA28'];

            for (let i = 0; i < 80; i++)
            {
                const particle = document.createElement('div');

                particle.className = 'burst-particle';

                const angle = Math.random() * 2 * Math.PI;
                const distance = 120 + Math.random() * 450;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 80;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');

                const pSize = 6 + Math.random() * 28;

                particle.style.width = pSize + 'px';
                particle.style.height = pSize + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = (cx - pSize / 2) + 'px';
                particle.style.top = (cy - pSize / 2) + 'px';
                particle.style.boxShadow = '0 0 25px rgba(255,215,0,0.5)';
                particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                particle.style.animationDelay = (Math.random() * 0.3) + 's';
                document.body.appendChild(particle);
                setTimeout(function()
                {
                    particle.remove();
                }, 3000);
            }

            for (let i = 0; i < 40; i++)
            {
                const spark = document.createElement('div');

                spark.className = 'spark-particle';

                const angle = Math.random() * 2 * Math.PI;
                const distance = 80 + Math.random() * 300;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 60;

                spark.style.setProperty('--tx', tx + 'px');
                spark.style.setProperty('--ty', ty + 'px');

                const pSize = 2 + Math.random() * 8;

                spark.style.width = pSize + 'px';
                spark.style.height = pSize + 'px';
                spark.style.left = (cx - pSize / 2) + 'px';
                spark.style.top = (cy - pSize / 2) + 'px';
                spark.style.background = 'rgba(255, 215, 0, ' + (0.2 + Math.random() * 0.3) + ')';
                spark.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(spark);
                setTimeout(function()
                {
                    spark.remove();
                }, 3500);
            }

            bigPacman.classList.add('burst');

            const flash = document.createElement('div');

            flash.style.cssText = 'position: fixed; inset: 0; background: radial-gradient(circle at ' + cx + 'px ' + cy + 'px, rgba(255,215,0,0.15) 0%, transparent 55%); pointer-events: none; z-index: 3; animation: flashFade 1.2s ease-out forwards;';
            document.body.appendChild(flash);
            setTimeout(function()
            {
                flash.remove();
            }, 1500);

            if (!document.getElementById('flashKeyframes'))
            {
                const style = document.createElement('style');

                style.id = 'flashKeyframes';
                style.textContent = '@keyframes flashFade { 0% { opacity: 1; } 100% { opacity: 0; } }';
                document.head.appendChild(style);
            }
        }

        function handleStart()
        {
            const nickname = nicknameInput.value.trim();

            if (!nickname)
            {
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';

            burstPacmanSlow();

            setTimeout(function()
            {
                loginScreen.classList.add('hidden');

                const event = new CustomEvent('login-success', { detail: { nickname } });

                document.dispatchEvent(event);
            }, 600);
        }

        startBtn.addEventListener('click', handleStart);
        nicknameInput.addEventListener('keydown', function(e)
        {
            if (e.key === 'Enter')
                handleStart();
        });

        nicknameInput.addEventListener('focus', function()
        {
            errorMsg.style.display = 'none';
        });

        document.addEventListener('login-success', function(e)
        {
            console.log('Player entered:', e.detail.nickname);
            window.__nickname = e.detail.nickname;
        });

        window.__nickname = null;

        document.getElementById('restart').addEventListener('click', function()
        {
            if (window.__restartCallback)
            {
                window.__restartCallback();
            }
        });
    </script>

    <script type="module" src="pst_main.js"></script>
</body>
</html>
